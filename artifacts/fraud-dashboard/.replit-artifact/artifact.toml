kind = "web"
previewPath = "/"
title = "FraudIQ — Fraud Detection Dashboard"
version = "1.0.0"
id = "artifacts/fraud-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20272

[services.development]
run = "pnpm --filter @workspace/fraud-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fraud-dashboard", "run", "build" ]
publicDir = "artifacts/fraud-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20272"
BASE_PATH = "/"
